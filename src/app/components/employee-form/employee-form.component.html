<form class="employee-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <fieldset [disabled]="loading" class="form-fieldset">
    <div class="form-card">
      <div class="form-header">
        <vc-heading [level]="2">Dados do funcionario</vc-heading>
        <vc-text [muted]="true">Preencha os dados essenciais para liberar o acesso ao sistema.</vc-text>
      </div>

      <div class="form-grid">
        <vc-input
          id="employee-full-name"
          label="Nome completo"
          placeholder="Ex: Maria Silva"
          formControlName="fullName"
          [required]="true"
          [error]="
            form.controls.fullName.touched && form.controls.fullName.invalid
              ? 'Informe o nome completo.'
              : ''
          "
        ></vc-input>

        <vc-input
          id="employee-email"
          label="Email"
          type="email"
          mask="email"
          placeholder="email@empresa.com"
          formControlName="email"
          [required]="true"
          [error]="
            form.controls.email.touched && form.controls.email.invalid
              ? 'Informe um email valido.'
              : ''
          "
        ></vc-input>

        <vc-select
          id="employee-role"
          label="Cargo"
          placeholder="Selecione um cargo"
          formControlName="role"
          [required]="true"
          [options]="roleOptions"
          [error]="form.controls.role.touched && form.controls.role.invalid ? 'Selecione o cargo.' : ''"
        ></vc-select>

        <vc-input
          id="employee-department"
          label="Departamento"
          placeholder="Ex: Clinica geral"
          formControlName="department"
        ></vc-input>

        <vc-input
          id="employee-phone"
          label="Telefone"
          type="tel"
          mask="phone"
          placeholder="(11) 99999-9999"
          formControlName="phone"
        ></vc-input>

        <vc-select
          id="employee-access-level"
          label="Perfil de acesso"
          placeholder="Selecione o perfil"
          formControlName="accessLevel"
          [required]="true"
          [options]="accessLevelOptions"
          [error]="
            form.controls.accessLevel.touched && form.controls.accessLevel.invalid
              ? 'Defina o perfil de acesso.'
              : ''
          "
        ></vc-select>
      </div>

      <div class="toggle-row">
        <label class="switch">
          <input type="checkbox" formControlName="active" />
          <span class="slider"></span>
        </label>
        <div>
          <strong>Status ativo</strong>
          <p>Usuario pode acessar o sistema apos o cadastro.</p>
        </div>
      </div>

      <div class="form-actions">
        <vc-button type="button" variant="ghost" (click)="resetForm()">Limpar</vc-button>
        <vc-button type="submit" [loading]="loading" [disabled]="loading">
          {{ loading ? 'Salvando...' : 'Salvar funcionario' }}
        </vc-button>
      </div>

      <p class="error-banner" *ngIf="error">{{ error }}</p>
    </div>
  </fieldset>
</form>
